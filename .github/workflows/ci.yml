name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # --frozen is brittle when contributors edit pyproject.toml.
      # Use a non-frozen sync; CI still pins by lockfile, just regenerates if drifted.
      - name: Install dependencies
        run: uv sync

      - name: Verify lockfile up to date
        run: |
          uv lock --check || {
            echo "::error::pyproject.toml changed without updating uv.lock. Run 'uv lock' locally and commit."
            exit 1
          }

      - name: Hide-failure guard (mechanical enforcement of NON_NEGOTIABLE rules)
        run: bash scripts/check_no_hidden_failures.sh origin/main

      - name: Ruff
        run: uv run ruff check . --exclude '.claude/worktrees/**'

      - name: Mypy (matches pyproject scope)
        run: uv run mypy

      - name: Pytest — unit + integration + adversarial
        run: uv run pytest tests/unit tests/integration tests/adversarial -q

      - name: Pytest — smoke
        run: uv run pytest tests/smoke -q

      - name: Pytest — MCPs
        run: uv run pytest mcps -q

      - name: Pytest — agentcore Python tests
        run: uv run pytest agentcore/tests -q -k "not test_ts"

      - name: Audit fork depth
        run: bash scripts/audit-fork-depth.sh

      - name: Single-writer CI gate
        run: bash scripts/verify_single_writer.sh

      - name: Install agentcore dependencies
        run: cd agentcore/server-fork && bun install

      - name: Single-writer perf budget
        run: bun test tests/event-emitter.test.ts --timeout=30000

      - name: Verify Priority 1 docs
        run: bash scripts/verify_priority_1.sh
