name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check nxl/ mcps/

      - name: Mypy
        run: uv run mypy nxl

      - name: Pytest (unit + integration + adversarial)
        run: uv run pytest tests/unit tests/integration tests/adversarial -q --ignore=tests/integration/test_run_event_emission.py

      - name: Pytest (smoke)
        run: uv run pytest tests/smoke -q
