[pytest]
testpaths = tests
addopts = --strict-markers -ra
markers =
    phase_m_minus_1: user-simulation E2E scenario expected from M-1 onward
    phase_m0: user-simulation E2E scenario expected from M0 onward
    phase_m1: user-simulation E2E scenario expected from M1 onward
    phase_m2: user-simulation E2E scenario expected from M2 onward
    phase_m3: user-simulation E2E scenario expected from M3 onward
    phase_m4: user-simulation E2E scenario expected from M4 onward
    slow: long-running user-simulation scenario
